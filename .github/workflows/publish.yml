name: Publish

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Publish recto-opc
        run: cargo publish -p recto-opc --no-verify || echo "already published"

      - name: Wait for index
        run: sleep 60

      - name: Publish recto-oxml
        run: cargo publish -p recto-oxml --no-verify || echo "already published"

      - name: Wait for index
        run: sleep 60

      - name: Publish recto-layout
        run: cargo publish -p recto-layout --no-verify || echo "already published"

      - name: Wait for index
        run: sleep 60

      - name: Publish recto-html
        run: cargo publish -p recto-html --no-verify || echo "already published"

      - name: Wait for index
        run: sleep 60

      - name: Publish recto-pdf
        run: cargo publish -p recto-pdf --no-verify || echo "already published"

      - name: Wait for index
        run: sleep 60

      - name: Publish recto
        run: cargo publish -p recto --no-verify || echo "already published"

      - name: Wait for index
        run: sleep 60

      - name: Publish recto-cli
        run: cargo publish -p recto-cli --no-verify || echo "already published"

  release:
    name: GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        run: gh release create "${{ github.ref_name }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
